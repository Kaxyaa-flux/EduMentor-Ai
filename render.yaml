services:
  - type: web
    name: edumentor-ai
    runtime: docker
    dockerfilePath: ./edumentor-ai/Dockerfile
    dockerContext: ./edumentor-ai
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: edumentor-db
          property: connectionString
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: NEXTAUTH_URL
        sync: false
      - key: GROQ_API_KEY
        sync: false

databases:
  - name: edumentor-db
    plan: free
    databaseName: edumentor
    user: edumentor_user
